<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.socket.io; style-src 'self' 'unsafe-inline'; connect-src 'self' http://localhost:* ws://localhost:*;">
  <title>Interviewer Notification</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: transparent;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 12px;
      color: #fff;
    }

    .card {
      background: rgba(18, 18, 30, 0.97);
      border: 1px solid rgba(168, 85, 247, 0.55);
      border-radius: 10px;
      padding: 10px 13px 10px 13px;
      margin: 4px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.7), 0 0 0 1px rgba(168,85,247,0.15);
      display: flex;
      flex-direction: column;
      gap: 6px;
      -webkit-app-region: drag;
    }

    .top-row {
      display: flex;
      align-items: center;
      gap: 6px;
      -webkit-app-region: no-drag;
    }

    .label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #a78bfa;
      flex: 1;
    }

    .close-btn {
      background: none;
      border: none;
      color: #475569;
      font-size: 14px;
      cursor: pointer;
      line-height: 1;
      padding: 0 2px;
      -webkit-app-region: no-drag;
    }
    .close-btn:hover { color: #94a3b8; }

    .excerpt {
      font-size: 11.5px;
      color: #94a3b8;
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      -webkit-app-region: no-drag;
    }

    .btn-row {
      display: flex;
      gap: 6px;
      -webkit-app-region: no-drag;
    }

    .btn-enroll {
      flex: 1;
      padding: 5px 0;
      border-radius: 6px;
      border: 1px solid rgba(168, 85, 247, 0.65);
      background: rgba(168, 85, 247, 0.18);
      color: #c4b5fd;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.12s;
    }
    .btn-enroll:hover { background: rgba(168, 85, 247, 0.32); }

    .btn-skip {
      padding: 5px 14px;
      border-radius: 6px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      background: transparent;
      color: #64748b;
      font-size: 11px;
      cursor: pointer;
      transition: color 0.12s;
    }
    .btn-skip:hover { color: #94a3b8; }

    .cooldown-bar {
      height: 2px;
      background: rgba(168, 85, 247, 0.25);
      border-radius: 2px;
      overflow: hidden;
      -webkit-app-region: no-drag;
    }
    .cooldown-fill {
      height: 100%;
      background: #a78bfa;
      border-radius: 2px;
      width: 100%;
      transition: width 15s linear;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="top-row">
      <span class="label">Interviewer detected</span>
      <button class="close-btn" id="btnClose">✕</button>
    </div>
    <div class="excerpt" id="excerpt">…</div>
    <div class="btn-row">
      <button class="btn-enroll" id="btnEnroll">Enroll as interviewer</button>
      <button class="btn-skip"   id="btnSkip">Skip (11 min)</button>
    </div>
    <div class="cooldown-bar"><div class="cooldown-fill" id="cooldownFill"></div></div>
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    const urlParams  = new URLSearchParams(window.location.search);
    const socketUrl  = urlParams.get('socketUrl') || 'http://localhost:4000';

    let currentAudioId = null;
    let autoCloseTimer = null;
    let skipCooldownUntil = 0;   // epoch ms — ignore events before this time
    const COOLDOWN_MS = 660_000; // 11 minutes after Skip

    const excerptEl    = document.getElementById('excerpt');
    const btnEnroll    = document.getElementById('btnEnroll');
    const btnSkip      = document.getElementById('btnSkip');
    const btnClose     = document.getElementById('btnClose');
    const cooldownFill = document.getElementById('cooldownFill');

    // ── Socket ───────────────────────────────────────────────────────────────
    const socket = io(socketUrl, {
      path: '/socket.io',
      transports: ['websocket'],
      reconnection: true,
      reconnectionDelay: 1000,
    });

    socket.on('connect', () => {
      socket.emit('get_enrollment_status');
    });

    socket.on('possible_interviewer_speech', ({ audio_id, text }) => {
      if (!audio_id || !text) return;
      if (Date.now() < skipCooldownUntil) return;   // within cooldown — ignore

      // Check if interviewer already enrolled
      socket.emit('get_enrollment_status');
      showToast(audio_id, text);
    });

    socket.on('enrollment_status', (data) => {
      // If interviewer already enrolled, don't show toasts
      if (data?.interviewer_enrolled) {
        hideToast();
      }
    });

    socket.on('interviewer_enrollment_complete', ({ success }) => {
      if (success) hideToast();
    });

    // ── Toast lifecycle ──────────────────────────────────────────────────────
    function showToast(audioId, text) {
      currentAudioId = audioId;
      excerptEl.textContent = text.length > 65 ? text.slice(0, 65) + '…' : text;

      // Restart countdown bar animation
      cooldownFill.style.transition = 'none';
      cooldownFill.style.width = '100%';
      void cooldownFill.offsetWidth;  // force reflow
      cooldownFill.style.transition = 'width 15s linear';
      cooldownFill.style.width = '0%';

      // Send IPC to main to show + position this window
      if (window.notifAPI?.show) window.notifAPI.show();

      clearTimeout(autoCloseTimer);
      autoCloseTimer = setTimeout(() => hideToast(), 15_000);
    }

    function hideToast() {
      clearTimeout(autoCloseTimer);
      currentAudioId = null;
      if (window.notifAPI?.hide) window.notifAPI.hide();
    }

    // ── Button handlers ──────────────────────────────────────────────────────
    btnEnroll.addEventListener('click', () => {
      if (!currentAudioId) return;
      socket.emit('enroll_interviewer', { audio_id: currentAudioId });
      hideToast();
    });

    btnSkip.addEventListener('click', () => {
      skipCooldownUntil = Date.now() + COOLDOWN_MS;
      hideToast();
    });

    btnClose.addEventListener('click', () => {
      skipCooldownUntil = Date.now() + COOLDOWN_MS;
      hideToast();
    });
  </script>
</body>
</html>
