<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.socket.io; style-src 'self' 'unsafe-inline'; connect-src 'self' http://localhost:* http://127.0.0.1:* ws://localhost:* ws://127.0.0.1:*;">
  <title>SolveWatch HUD</title>
  <meta name="color-scheme" content="dark">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-alpha: 0.85;
    }

    html {
      color-scheme: dark;
      background: transparent;
    }

    html, body {
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 12px;
      color: #ffffff;
      overflow: hidden;
      height: 100%;
    }

    .hud-panel {
      background: rgba(18, 18, 24, var(--bg-alpha));
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 12px;
      overflow: visible;
      height: 100%;
      display: flex;
      flex-direction: column;
      -webkit-app-region: drag;
      position: relative;
    }

    .drag-region {
      -webkit-app-region: drag;
      cursor: grab;
      padding: 10px 14px;
      background: rgba(30, 32, 44, calc(var(--bg-alpha) * 0.9));
      border-bottom: 1px solid rgba(255, 255, 255, 0.35);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .drag-region h1 {
      font-size: 13px;
      font-weight: 600;
      color: #ffffff;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #64748b;
      flex-shrink: 0;
    }

    .status-dot.connected {
      background: #22c55e;
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.6);
    }

    .status-dot.disconnected { background: #ef4444; }

    #statusText { color: #ffffff; }

    .clock {
      font-variant-numeric: tabular-nums;
      color: #ffffff;
      font-size: 11px;
    }

    /* ── Live transcription strip ───────────────────────────────────── */
    .live-strip {
      flex-shrink: 0;
      padding: 6px 14px;
      background: rgba(15, 16, 24, 0.85);
      border-bottom: 1px solid rgba(255, 255, 255, 0.35);
      font-size: 10px;
      color: #334155;
      line-height: 1.4;
      min-height: 28px;
      font-style: italic;
      -webkit-app-region: no-drag;
      word-break: break-word;
    }

    .live-strip.active {
      color: #94a3b8;
      font-style: normal;
    }

    .live-strip.persisted {
      color: #475569;
      font-style: normal;
    }

    .qa-placeholder {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .qa-placeholder-item {
      padding: 8px 10px;
      background: rgba(20, 22, 32, 0.4);
      border-radius: 6px;
      border-left: 2px solid rgba(71, 85, 105, 0.2);
    }

    .qa-placeholder-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #1e293b;
      margin-bottom: 5px;
    }

    .qa-placeholder-bar {
      height: 8px;
      border-radius: 3px;
      background: rgba(30, 41, 59, 0.5);
      margin-bottom: 4px;
    }

    .qa-placeholder-bar.short { width: 55%; }
    .qa-placeholder-bar.medium { width: 75%; }

    /* ── Nav bar ─────────────────────────────────────────────────────── */
    .nav-bar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.35);
      background: rgba(20, 22, 32, 0.85);
      -webkit-app-region: no-drag;
    }

    .nav-counter {
      flex: 1;
      font-size: 10px;
      color: #475569;
      font-variant-numeric: tabular-nums;
    }

    .nav-btn {
      width: 26px;
      height: 22px;
      border-radius: 4px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      background: rgba(30, 32, 44, 0.8);
      color: #64748b;
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.12s, color 0.12s;
      line-height: 1;
    }

    .nav-btn:hover:not(:disabled) { background: rgba(60, 65, 90, 0.9); color: #e2e8f0; }
    .nav-btn:disabled { opacity: 0.2; cursor: not-allowed; }

    /* New answer available while viewing an older question */
    .nav-btn.new-answer {
      background: rgba(34, 197, 94, 0.15);
      border-color: rgba(34, 197, 94, 0.8);
      color: #22c55e;
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.4);
      animation: pulse-green 1.5s ease-in-out infinite;
    }

    @keyframes pulse-green {
      0%, 100% { box-shadow: 0 0 8px rgba(34, 197, 94, 0.4); }
      50%       { box-shadow: 0 0 14px rgba(34, 197, 94, 0.8); }
    }

    /* ── Content ─────────────────────────────────────────────────────── */
    .content {
      padding: 12px;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      -webkit-app-region: no-drag;
    }

    .ai-response-label {
      font-size: 11px;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: grab;
      -webkit-app-region: drag;
    }

    .ai-response {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      background: rgba(30, 32, 44, calc(var(--bg-alpha) * 0.7));
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.6;
      color: #ffffff;
      word-break: break-word;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .ai-response::-webkit-scrollbar { width: 6px; }
    .ai-response::-webkit-scrollbar-track { background: rgba(40,40,40,0.5); border-radius: 3px; }
    .ai-response::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }

    .code-block {
      margin: 8px 0;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid rgba(148, 163, 184, 0.2);
    }

    .code-lang {
      display: block;
      padding: 3px 10px;
      background: rgba(30, 30, 30, 0.9);
      color: #94a3b8;
      font-size: 10px;
      font-family: 'SF Mono', 'Monaco', 'Inconsolata', monospace;
      text-transform: lowercase;
      letter-spacing: 0.5px;
    }

    .code-block pre {
      margin: 0;
      padding: 10px;
      background: rgba(15, 15, 15, 0.85);
      overflow-x: auto;
    }

    .code-block pre code {
      font-family: 'SF Mono', 'Monaco', 'Inconsolata', monospace;
      font-size: 11px;
      line-height: 1.5;
      color: #e2e8f0;
      white-space: pre;
    }

    .inline-code {
      font-family: 'SF Mono', 'Monaco', 'Inconsolata', monospace;
      font-size: 11px;
      background: rgba(15, 15, 15, 0.7);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 3px;
      padding: 1px 4px;
      color: #cbd5e1;
    }

    .md-list {
      margin: 4px 0 6px 4px;
      padding: 0;
      list-style: none;
    }

    .md-list li {
      position: relative;
      padding-left: 14px;
      margin-bottom: 6px;
      line-height: 1.55;
      color: #e2e8f0;
    }

    .md-list li::before {
      content: '›';
      position: absolute;
      left: 0;
      color: #22c55e;
      font-weight: bold;
      font-size: 13px;
      line-height: 1.4;
    }

    .md-h {
      font-size: 10px;
      font-weight: 700;
      color: #64748b;
      margin: 10px 0 4px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .text-content {
      color: #cbd5e1;
      line-height: 1.65;
      margin-bottom: 10px;
      display: block;
    }

    .text-content strong { color: #f1f5f9; font-weight: 600; }
    .text-content em { color: #cbd5e1; font-style: italic; }

    /* ── Q&A viewer ──────────────────────────────────────────────────── */
    .qa-viewer {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .qa-viewer::-webkit-scrollbar { width: 6px; }
    .qa-viewer::-webkit-scrollbar-track { background: rgba(40,40,40,0.5); border-radius: 3px; }
    .qa-viewer::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }

    .qa-empty {
      color: #334155;
      font-style: italic;
      font-size: 11px;
    }

    .qa-question {
      flex-shrink: 0;
      padding: 8px 10px;
      background: rgba(30, 30, 40, 0.5);
      border-radius: 6px;
      border-left: 2px solid rgba(148, 163, 184, 0.25);
      font-size: 11px;
      color: #64748b;
      line-height: 1.5;
    }

    .qa-question-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #334155;
      margin-bottom: 3px;
    }

    .qa-answer-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #22c55e;
      margin: 8px 0 4px;
    }

    .qa-answer {
      font-size: 12px;
      color: #e2e8f0;
      line-height: 1.6;
      word-break: break-word;
    }

    /* ── Typing indicator ────────────────────────────────────────────── */
    .typing-indicator {
      display: flex;
      gap: 3px;
      align-items: center;
      padding: 4px 0;
    }

    .typing-indicator span {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: #22c55e;
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-4px); opacity: 1; }
    }

    /* ── Thinking placeholder ────────────────────────────────────────── */
    .thinking-placeholder {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #475569;
      font-style: italic;
      font-size: 11px;
      padding: 4px 0;
    }

    .thinking-placeholder .thinking-dots span {
      display: inline-block;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: #475569;
      margin: 0 1px;
      animation: bounce 1.2s infinite;
    }
    .thinking-placeholder .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
    .thinking-placeholder .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }

    /* ── Streaming text + caret ──────────────────────────────────────── */
    .stream-text {
      color: #cbd5e1;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 12px;
    }

    .stream-caret {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: #22c55e;
      margin-left: 1px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    /* ── Confidence-weighted live strip ──────────────────────────────── */
    .committed-text { color: #94a3b8; }
    .tentative-text { color: #94a3b8; opacity: 0.45; font-style: italic; }

    /* ── Action bar ──────────────────────────────────────────────────── */
    .action-bar {
      flex-shrink: 0;
      padding: 7px 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.35);
      display: flex;
      align-items: center;
      gap: 8px;
      -webkit-app-region: no-drag;
    }

    .action-status {
      flex: 1;
      font-size: 10px;
      color: #64748b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .action-buttons {
      display: flex;
      gap: 5px;
      flex-shrink: 0;
    }

    .action-btn {
      padding: 3px 9px;
      border-radius: 5px;
      border: 1px solid rgba(148, 163, 184, 0.25);
      background: rgba(40, 40, 40, 0.8);
      color: #94a3b8;
      font-size: 11px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      cursor: pointer;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }

    .action-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .action-btn.listen-btn { border-color: rgba(239,68,68,0.5); color: #ef4444; }
    .action-btn.listen-btn:hover { background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.8); }
    .action-btn.listen-btn.listening {
      background: rgba(34,197,94,0.15);
      border-color: rgba(34,197,94,0.7);
      color: #22c55e;
      box-shadow: 0 0 8px rgba(34,197,94,0.25);
    }

    .action-btn.debug-btn:not(:disabled) { border-color: rgba(239,68,68,0.45); }
    .action-btn.debug-btn:not(:disabled):hover { background: rgba(239,68,68,0.15); color: #fca5a5; border-color: rgba(239,68,68,0.7); }

    .action-btn.theory-btn:not(:disabled) { border-color: rgba(168,85,247,0.45); }
    .action-btn.theory-btn:not(:disabled):hover { background: rgba(168,85,247,0.15); color: #d8b4fe; border-color: rgba(168,85,247,0.7); }

    .action-btn.coding-btn:not(:disabled) { border-color: rgba(34,197,94,0.45); }
    .action-btn.coding-btn:not(:disabled):hover { background: rgba(34,197,94,0.15); color: #86efac; border-color: rgba(34,197,94,0.7); }
  </style>
</head>
<body>
  <div class="hud-panel">

    <!-- Header — draggable -->
    <div class="drag-region">
      <h1>SolveWatch HUD</h1>
      <div class="status-badge">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Connecting…</span>
        <span class="clock" id="clock">--:--:--</span>
      </div>
    </div>

    <!-- Live transcription strip -->
    <div class="live-strip" id="liveStrip">No real-time transcription</div>

    <!-- Nav bar: Q counter + ← → -->
    <div class="nav-bar">
      <span class="nav-counter" id="navCounter">—</span>
      <button class="nav-btn" id="btnPrev" disabled>←</button>
      <button class="nav-btn" id="btnNext" disabled>→</button>
    </div>

    <!-- Q&A content -->
    <div class="content">
      <div class="ai-response-label"></div>
      <div class="qa-viewer" id="qaViewer">
        <div class="qa-empty">Press Cmd+Shift+X to start recording…</div>
      </div>
    </div>

    <!-- Action bar -->
    <div class="action-bar">
      <span class="action-status" id="actionStatus"></span>
      <div class="action-buttons">
        <button class="action-btn listen-btn" id="btnListen">⬤ Listen</button>
        <button class="action-btn debug-btn"  id="btnDebug"  disabled>Debug</button>
        <button class="action-btn theory-btn" id="btnTheory" disabled>Theory</button>
        <button class="action-btn coding-btn" id="btnCoding" disabled>Coding</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    const urlParams   = new URLSearchParams(window.location.search);
    const socketUrl   = urlParams.get('socketUrl') || 'http://localhost:4000';

    const statusDot   = document.getElementById('statusDot');
    const statusText  = document.getElementById('statusText');
    const clockEl     = document.getElementById('clock');
    const btnListen   = document.getElementById('btnListen');
    const btnPrev     = document.getElementById('btnPrev');
    const btnNext     = document.getElementById('btnNext');
    const navCounter  = document.getElementById('navCounter');
    const liveStrip   = document.getElementById('liveStrip');
    const qaViewer    = document.getElementById('qaViewer');
    const btnDebug    = document.getElementById('btnDebug');
    const btnTheory   = document.getElementById('btnTheory');
    const btnCoding   = document.getElementById('btnCoding');
    const actionStatus = document.getElementById('actionStatus');

    let currentMessageId = null;
    let countdownInterval = null;
    let isListening = false;
    let liveLines   = [];
    let allQAs      = [];
    let viewIndex   = -1;
    let isLocked    = false;
    let transcriptionMap = {}; // questionId → captured transcription string
    let screenshotStatus = ''; // current screenshot pipeline status

    // ── Opacity ──────────────────────────────────────────────────────
    function applyOpacity(value) {
      if (window.hudAPI?.setOpacity) window.hudAPI.setOpacity(value);
      try { localStorage.setItem('hud_opacity', value); } catch {}
    }
    try {
      const saved = localStorage.getItem('hud_opacity');
      if (saved !== null) applyOpacity(parseInt(saved));
    } catch {}

    // ── Clock ────────────────────────────────────────────────────────
    function updateClock() {
      clockEl.textContent = new Date().toLocaleTimeString('en-GB', {
        hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit'
      });
    }
    setInterval(updateClock, 1000);
    updateClock();

    // ── Connection ───────────────────────────────────────────────────
    function setConnectionStatus(connected, text) {
      statusDot.className = 'status-dot ' + (connected ? 'connected' : 'disconnected');
      statusText.textContent = text;
    }

    // ── Helpers ──────────────────────────────────────────────────────
    function setButtons(enabled) {
      btnDebug.disabled  = !enabled;
      btnTheory.disabled = !enabled;
      btnCoding.disabled = !enabled;
    }

    function setActionStatus(text) { actionStatus.textContent = text; }

    function startCountdown(seconds) {
      clearInterval(countdownInterval);
      let remaining = seconds;
      setActionStatus(`Screenshot window: ${remaining}s`);
      countdownInterval = setInterval(() => {
        remaining--;
        if (remaining > 0) setActionStatus(`Screenshot window: ${remaining}s`);
        else { clearInterval(countdownInterval); setActionStatus('Processing…'); }
      }, 1000);
    }

    // ── Listen toggle ─────────────────────────────────────────────────
    function updateLiveStrip() {
      const qa = viewIndex >= 0 ? allQAs[viewIndex] : null;
      const saved = qa ? (transcriptionMap[qa.questionId] || '') : '';
      if (isListening) return; // don't overwrite while live
      if (screenshotStatus) {
        liveStrip.textContent = screenshotStatus;
        liveStrip.className = 'live-strip active';
      } else if (saved) {
        liveStrip.textContent = saved;
        liveStrip.className = 'live-strip persisted';
      } else {
        liveStrip.textContent = 'No real-time transcription';
        liveStrip.className = 'live-strip';
      }
    }

    function setListening(active) {
      isListening = active;
      btnListen.classList.toggle('listening', active);
      btnListen.textContent = active ? '⬤ Listening' : '⬤ Listen';
      if (!active) {
        liveLines = [];
        updateLiveStrip();
      }
    }

    function toggleListen() {
      isListening = !isListening;
      socket.emit('toggle_listen_mode', { enabled: isListening });
      setListening(isListening);
    }

    btnListen.addEventListener('click', () => toggleListen());

    if (window.hudAPI?.onToggleListen) {
      window.hudAPI.onToggleListen(() => toggleListen());
    }

    // ── Markdown renderer ─────────────────────────────────────────────
    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function renderInline(text) {
      let h = escapeHtml(text);
      h = h.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
      h = h.replace(/\*([^*\n]+)\*/g,     '<em>$1</em>');
      h = h.replace(/`([^`\n]+)`/g,       '<code class="inline-code">$1</code>');
      return h;
    }

    function renderTextBlock(text) {
      const lines = text.split('\n');
      let html = '', listItems = [];
      function flushList() {
        if (!listItems.length) return;
        html += '<ul class="md-list">' + listItems.map(t => '<li>' + t + '</li>').join('') + '</ul>';
        listItems = [];
      }
      for (const line of lines) {
        const t = line.trim();
        if (/^[-*]\s+/.test(t)) {
          listItems.push(renderInline(t.replace(/^[-*]\s+/, '')));
        } else {
          flushList();
          if (/^#{1,3}\s/.test(t))          html += '<div class="md-h">' + renderInline(t.replace(/^#{1,3}\s+/, '')) + '</div>';
          else if (/^[A-Za-z ]+:$/.test(t)) html += '<div class="md-h">' + escapeHtml(t.replace(/:$/, '')) + '</div>';
          else if (t)                        html += '<div class="text-content">' + renderInline(t) + '</div>';
        }
      }
      flushList();
      return html;
    }

    function renderMarkdown(text) {
      if (!text) return '';
      let html = '';
      for (const part of text.split(/(```[\s\S]*?```)/g)) {
        const fenced = part.match(/^```(\w*)\n?([\s\S]*?)\n?```$/);
        if (fenced) {
          const lang = fenced[1] || '';
          html += '<div class="code-block">'
            + (lang ? '<span class="code-lang">' + escapeHtml(lang) + '</span>' : '')
            + '<pre><code>' + escapeHtml(fenced[2]) + '</code></pre></div>';
        } else {
          html += renderTextBlock(part);
        }
      }
      return html;
    }

    // ── Q&A viewer ────────────────────────────────────────────────────
    function renderNav() {
      const total = allQAs.length;
      navCounter.textContent = total > 0 ? `Q ${viewIndex + 1} / ${total}` : '—';
      btnPrev.disabled = viewIndex <= 0;
      btnNext.disabled = viewIndex >= total - 1;
    }

    function renderCurrentQA() {
      qaViewer.innerHTML = '';
      if (viewIndex < 0 || viewIndex >= allQAs.length) {
        qaViewer.innerHTML = `
          <div class="qa-placeholder">
            <div class="qa-placeholder-item">
              <div class="qa-placeholder-label">Question 1</div>
              <div class="qa-placeholder-bar medium"></div>
              <div class="qa-placeholder-bar short"></div>
            </div>
            <div class="qa-placeholder-item">
              <div class="qa-placeholder-label">Question 2</div>
              <div class="qa-placeholder-bar short"></div>
              <div class="qa-placeholder-bar medium"></div>
            </div>
          </div>`;
        updateLiveStrip();
        return;
      }
      updateLiveStrip();
      const qa = allQAs[viewIndex];

      const qLabel = document.createElement('div');
      qLabel.className = 'qa-question-label';
      qLabel.textContent = 'Question';
      qaViewer.appendChild(qLabel);

      const qEl = document.createElement('div');
      qEl.className = 'qa-question';
      qEl.textContent = qa.questionText || '';
      qaViewer.appendChild(qEl);

      const aLabel = document.createElement('div');
      aLabel.className = 'qa-answer-label';
      aLabel.textContent = 'Answer';
      qaViewer.appendChild(aLabel);

      const aEl = document.createElement('div');
      aEl.className = 'qa-answer';
      if (!qa.done && !qa.answer) {
        aEl.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
      } else {
        aEl.innerHTML = renderMarkdown(qa.answer);
      }
      qaViewer.appendChild(aEl);
    }

    function navigate(delta) {
      const next = viewIndex + delta;
      if (next < 0 || next >= allQAs.length) return;
      viewIndex = next;
      isLocked = viewIndex < allQAs.length - 1;
      // Clear new-answer highlight once they reach the latest question
      if (!isLocked) btnNext.classList.remove('new-answer');
      renderNav();
      renderCurrentQA(); // calls updateLiveStrip internally
    }

    document.addEventListener('keydown', (e) => {
      if (e.metaKey && e.key === 'ArrowLeft')  navigate(-1);
      if (e.metaKey && e.key === 'ArrowRight') navigate(1);
    });

    btnPrev.addEventListener('click', () => navigate(-1));
    btnNext.addEventListener('click', () => navigate(1));

    // ── Socket ────────────────────────────────────────────────────────
    const socket = io(socketUrl + '/data-updates', { transports: ['websocket'] });

    socket.on('connect',       () => setConnectionStatus(true,  'Connected'));
    socket.on('disconnect',    () => setConnectionStatus(false, 'Disconnected'));
    socket.on('connect_error', () => setConnectionStatus(false, 'Error'));

    socket.on('hud_opacity_updated', (data) => {
      applyOpacity(data.value);
      socket.emit('hud_opacity_applied');
    });

    socket.on('listen_state_changed', (data) => setListening(!!data.listening));

    socket.on('transcription_chunk', (data) => {
      if (!data.text) return;
      // Only accumulate into liveLines while actively listening.
      // Chunks that arrive after the user releases the button are already
      // included in the server-side fullTranscription sent with
      // interviewer_question — adding them here would cause a mismatch.
      if (isListening) {
        liveLines.push(data.text.trim());
        if (liveLines.length > 3) liveLines.shift();
      }
      liveStrip.textContent = liveLines.join(' ');
      liveStrip.className = 'live-strip active';
    });

    // Confidence-weighted live strip — committed words bright, tentative dim.
    // Wired up now; will fire once streaming STT (phase 5) is built.
    socket.on('stt_partial', (data) => {
      const { committed, tentative } = data || {};
      let html = '';
      if (committed) html += `<span class="committed-text">${escapeHtml(committed)}</span>`;
      if (tentative) html += ` <span class="tentative-text">${escapeHtml(tentative)}</span>`;
      if (html) {
        liveStrip.innerHTML = html;
        liveStrip.className = 'live-strip active';
      }
    });

    // Screenshot pipeline status
    socket.on('screenshot_captured', () => {
      screenshotStatus = 'Screenshot captured';
      if (!isListening) updateLiveStrip();
    });

    socket.on('ocr_started', () => {
      screenshotStatus = 'OCR in progress…';
      if (!isListening) updateLiveStrip();
    });

    socket.on('ocr_complete', () => {
      screenshotStatus = 'AI analyzing…';
      if (!isListening) updateLiveStrip();
    });

    // Screenshot flow
    socket.on('ai_processing_started', () => {
      setButtons(false);
      screenshotStatus = 'AI analyzing…';
      if (!isListening) updateLiveStrip();
      if (!actionStatus.textContent) setActionStatus('Processing…');
    });

    socket.on('ai_processing_complete', (data) => {
      clearInterval(countdownInterval);
      screenshotStatus = '';
      if (!isListening) updateLiveStrip();
      if (data.messageId) {
        currentMessageId = data.messageId;
        setButtons(true);
        setActionStatus('');
      }
      if (data.response) {
        const screenshotId = `screenshot-${Date.now()}`;
        allQAs.push({ questionId: screenshotId, questionText: '📸 Screenshot Analysis', answer: data.response, done: true });
        if (!isLocked) {
          viewIndex = allQAs.length - 1;
          renderCurrentQA();
        }
        renderNav();
      }
    });

    socket.on('aiprocessing_error', (data) => {
      clearInterval(countdownInterval);
      screenshotStatus = '';
      if (!isListening) updateLiveStrip();
      setButtons(!!currentMessageId);
      setActionStatus('');
    });

    socket.on('use_prompt_set', (data) => {
      if (data.screenshotRequired) startCountdown(3);
      else { clearInterval(countdownInterval); setActionStatus('Processing…'); }
    });

    socket.on('use_prompt_error', (data) => {
      clearInterval(countdownInterval);
      setActionStatus('Error: ' + (data.error || 'Unknown'));
      setButtons(!!currentMessageId);
    });

    btnDebug.addEventListener('click', () => {
      if (!currentMessageId) return;
      setButtons(false);
      socket.emit('use_prompt', { promptType: 'debug', messageId: currentMessageId, screenshotRequired: true });
    });
    btnTheory.addEventListener('click', () => {
      if (!currentMessageId) return;
      setButtons(false);
      socket.emit('use_prompt', { promptType: 'theory', messageId: currentMessageId, screenshotRequired: false });
    });
    btnCoding.addEventListener('click', () => {
      if (!currentMessageId) return;
      setButtons(false);
      socket.emit('use_prompt', { promptType: 'coding', messageId: currentMessageId, screenshotRequired: false });
    });

    // Interview Q&A
    socket.on('interviewer_question', (data) => {
      // Use the server's authoritative full transcription for the strip display.
      transcriptionMap[data.questionId] = data.questionText || liveLines.join(' ').trim();
      allQAs.push({ questionId: data.questionId, questionText: data.questionText, answer: '', done: false, _textNode: null });
      if (!isLocked) {
        viewIndex = allQAs.length - 1;
        renderCurrentQA();
      }
      renderNav();

      // Show thinking placeholder immediately — the LLM hasn't fired yet but
      // the user's question is known. Replaces blank gap with visible feedback.
      if (!isLocked) {
        const aEl = qaViewer.querySelector('.qa-answer');
        if (aEl) {
          aEl.innerHTML = '<div class="thinking-placeholder">Thinking… <span class="thinking-dots"><span></span><span></span><span></span></span></div>';
        }
      }
    });

    socket.on('question_answer_started', (data) => {
      const qa = allQAs.find(q => q.questionId === data.questionId);
      if (!qa) return;
      qa.answer = '';
      qa.done = false;
      qa._textNode = null;
      // Thinking placeholder is already showing from interviewer_question — no re-render needed
    });

    // ── Raw token streaming — appendData instead of innerHTML re-render ──
    // Previously: aEl.innerHTML = renderMarkdown(qa.answer) on every token
    // — that re-parses the full accumulated string and replaces the entire DOM
    // subtree, causing visible jitter on long answers.
    // Now: append directly to a Text node (no parsing, no reflow per token).
    // Full markdown render happens once on question_answer_complete.
    socket.on('question_answer_token', (data) => {
      const qa = allQAs.find(q => q.questionId === data.questionId);
      if (!qa) return;
      qa.answer += data.token;

      if (allQAs.indexOf(qa) !== viewIndex) return;

      let aEl = qaViewer.querySelector('.qa-answer');
      if (!aEl) { renderCurrentQA(); return; }

      if (!qa._textNode) {
        // First token: clear thinking placeholder, set up text node + caret
        aEl.innerHTML = '';
        const pre = document.createElement('div');
        pre.className = 'stream-text';
        qa._textNode = document.createTextNode('');
        pre.appendChild(qa._textNode);
        aEl.appendChild(pre);

        const caret = document.createElement('span');
        caret.className = 'stream-caret';
        caret.id = `caret-${data.questionId}`;
        aEl.appendChild(caret);
      }

      qa._textNode.appendData(data.token);
      qaViewer.scrollTop = qaViewer.scrollHeight;
    });

    socket.on('question_answer_complete', (data) => {
      const qa = allQAs.find(q => q.questionId === data.questionId);
      if (!qa) return;
      qa.done = true;
      qa._textNode = null;
      if (allQAs.indexOf(qa) === viewIndex) {
        // Viewing this answer — do the full markdown render
        renderCurrentQA();
      } else {
        // Answer completed while user is reading an older question —
        // highlight the → button green so they know a new answer is ready
        btnNext.classList.add('new-answer');
      }
    });

    // ── Drag (original working implementation) ────────────────────────
    function initDrag() {
      document.querySelectorAll('.drag-region, .ai-response-label').forEach((el) => {
        el.addEventListener('mousedown', (e) => {
          if (e.button === 0 && window.hudAPI) {
            window.hudAPI.startDrag(e.screenX, e.screenY);
            const onMove = (ev) => window.hudAPI.dragMove(ev.screenX, ev.screenY);
            const onUp   = () => {
              window.hudAPI.endDrag();
              document.removeEventListener('mousemove', onMove);
              document.removeEventListener('mouseup', onUp);
            };
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onUp);
          }
        });
      });
    }
    initDrag();
  </script>
</body>
</html>
