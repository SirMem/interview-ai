<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.socket.io; connect-src 'self' http://localhost:* http://127.0.0.1:* ws://localhost:* ws://127.0.0.1:*;">
  <title>SolveWatch HUD</title>
  <meta name="color-scheme" content="dark">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      /* 0 = fully opaque, 1 = fully transparent */
      --bg-alpha: 0.85;
    }

    html {
      color-scheme: dark;
      background: transparent;
    }

    html, body {
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 12px;
      color: #ffffff;
      overflow: hidden;
      height: 100%;
    }

    .hud-panel {
      background: rgba(18, 18, 24, var(--bg-alpha));
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 12px;
      overflow: visible;
      height: 100%;
      display: flex;
      flex-direction: column;
      -webkit-app-region: drag;
      position: relative;
    }

    .drag-region {
      -webkit-app-region: drag;
      cursor: grab;
      padding: 10px 14px;
      background: rgba(30, 32, 44, calc(var(--bg-alpha) * 0.9));
      border-bottom: 1px solid rgba(148, 163, 184, 0.15);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .drag-region h1 {
      font-size: 13px;
      font-weight: 600;
      color: #ffffff;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #64748b;
      flex-shrink: 0;
    }

    .status-dot.connected {
      background: #22c55e;
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.6);
    }

    .status-dot.disconnected { background: #ef4444; }

    #statusText { color: #ffffff; }

    .clock {
      font-variant-numeric: tabular-nums;
      color: #ffffff;
      font-size: 11px;
    }

    .content {
      padding: 12px;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      -webkit-app-region: no-drag;
    }

    .ai-response-label {
      font-size: 11px;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: grab;
      -webkit-app-region: drag;
    }

    .ai-response {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      background: rgba(30, 32, 44, calc(var(--bg-alpha) * 0.7));
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.6;
      color: #ffffff;
      word-break: break-word;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .text-content { white-space: pre-wrap; }

    .code-block {
      margin: 8px 0;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid rgba(148, 163, 184, 0.2);
    }

    .code-lang {
      display: block;
      padding: 3px 10px;
      background: rgba(30, 30, 30, 0.9);
      color: #94a3b8;
      font-size: 10px;
      font-family: 'SF Mono', 'Monaco', 'Inconsolata', monospace;
      text-transform: lowercase;
      letter-spacing: 0.5px;
    }

    .code-block pre {
      margin: 0;
      padding: 10px;
      background: rgba(15, 15, 15, 0.85);
      overflow-x: auto;
    }

    .code-block pre code {
      font-family: 'SF Mono', 'Monaco', 'Inconsolata', monospace;
      font-size: 11px;
      line-height: 1.5;
      color: #e2e8f0;
      white-space: pre;
    }

    .inline-code {
      font-family: 'SF Mono', 'Monaco', 'Inconsolata', monospace;
      font-size: 11px;
      background: rgba(15, 15, 15, 0.7);
      border: 1px solid rgba(148, 163, 184, 0.2);
      border-radius: 3px;
      padding: 1px 4px;
      color: #cbd5e1;
    }

    .ai-response:empty::before {
      content: 'Waiting for AI response…';
      color: #64748b;
      font-style: italic;
    }

    .ai-response::-webkit-scrollbar { width: 6px; }
    .ai-response::-webkit-scrollbar-track { background: rgba(40,40,40,0.5); border-radius: 3px; }
    .ai-response::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }

    .q-section {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      padding: 8px 10px;
      background: rgba(30, 30, 40, 0.5);
      border-radius: 6px;
      margin-bottom: 10px;
      border-left: 2px solid rgba(148, 163, 184, 0.25);
      flex-shrink: 0;
    }

    .q-label {
      font-size: 10px;
      font-weight: 700;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding-top: 1px;
      flex-shrink: 0;
    }

    .q-text { font-size: 11px; color: #64748b; line-height: 1.5; }

    .md-list {
      margin: 4px 0 6px 4px;
      padding: 0;
      list-style: none;
    }

    .md-list li {
      position: relative;
      padding-left: 14px;
      margin-bottom: 6px;
      line-height: 1.55;
      color: #e2e8f0;
    }

    .md-list li::before {
      content: '›';
      position: absolute;
      left: 0;
      color: #22c55e;
      font-weight: bold;
      font-size: 13px;
      line-height: 1.4;
    }

    .md-h {
      font-size: 10px;
      font-weight: 700;
      color: #64748b;
      margin: 10px 0 4px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .text-content {
      color: #cbd5e1;
      line-height: 1.65;
      margin-bottom: 10px;
      display: block;
    }

    .text-content strong { color: #f1f5f9; font-weight: 600; }
    .text-content em { color: #cbd5e1; font-style: italic; }

    .action-bar {
      flex-shrink: 0;
      padding: 7px 12px;
      border-top: 1px solid rgba(148, 163, 184, 0.15);
      display: flex;
      align-items: center;
      gap: 8px;
      -webkit-app-region: no-drag;
    }

    .action-status {
      flex: 1;
      font-size: 10px;
      color: #64748b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .action-buttons {
      display: flex;
      gap: 5px;
      flex-shrink: 0;
    }

    .action-btn {
      padding: 3px 9px;
      border-radius: 5px;
      border: 1px solid rgba(148, 163, 184, 0.25);
      background: rgba(40, 40, 40, 0.8);
      color: #94a3b8;
      font-size: 11px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      cursor: pointer;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }

    .action-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .action-btn.debug-btn:not(:disabled) { border-color: rgba(239,68,68,0.45); }
    .action-btn.debug-btn:not(:disabled):hover { background: rgba(239,68,68,0.15); color: #fca5a5; border-color: rgba(239,68,68,0.7); }

    .action-btn.theory-btn:not(:disabled) { border-color: rgba(168,85,247,0.45); }
    .action-btn.theory-btn:not(:disabled):hover { background: rgba(168,85,247,0.15); color: #d8b4fe; border-color: rgba(168,85,247,0.7); }

    .action-btn.coding-btn:not(:disabled) { border-color: rgba(34,197,94,0.45); }
    .action-btn.coding-btn:not(:disabled):hover { background: rgba(34,197,94,0.15); color: #86efac; border-color: rgba(34,197,94,0.7); }

    .action-btn.listener-btn { border-color: rgba(234,179,8,0.45); color: #94a3b8; }
    .action-btn.listener-btn:hover { background: rgba(234,179,8,0.12); color: #fde047; border-color: rgba(234,179,8,0.7); }
    .action-btn.listener-btn.listener-active { background: rgba(234,179,8,0.2); color: #facc15; border-color: rgba(234,179,8,0.85); box-shadow: 0 0 8px rgba(234,179,8,0.25); }

    /* ── Interview queue ─────────────────────────────────────────────── */
    .interview-queue {
      flex-shrink: 0;
      margin-bottom: 8px;
    }

    .queue-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #475569;
      margin-bottom: 5px;
    }

    .queue-mode-badge { color: #22c55e; font-size: 9px; letter-spacing: 1px; }

    .question-cards {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .q-card {
      background: rgba(30, 40, 60, 0.65);
      border: 1px solid rgba(99, 130, 180, 0.25);
      border-radius: 7px;
      padding: 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      animation: slideIn 0.2s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .q-card[data-state="answering"],
    .q-card[data-state="done"] {
      border-color: rgba(34, 197, 94, 0.35);
    }

    .q-card-text { font-size: 11px; color: #cbd5e1; line-height: 1.5; }

    /* ── Typing indicator ────────────────────────────────────────────── */
    .typing-indicator {
      display: flex;
      gap: 3px;
      align-items: center;
      padding: 4px 0;
    }

    .typing-indicator span {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: #22c55e;
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-4px); opacity: 1; }
    }

    .q-card-answer-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
    }

    .q-card-answer-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #22c55e;
      flex-shrink: 0;
    }

    .q-card-answer-line {
      flex: 1;
      height: 1px;
      background: rgba(34, 197, 94, 0.25);
    }

    .q-card-answer {
      font-size: 11px;
      color: #e2e8f0;
      line-height: 1.6;
      padding-top: 6px;
      max-height: 160px;
      overflow-y: auto;
    }

    .q-card-answer::-webkit-scrollbar { width: 4px; }
    .q-card-answer::-webkit-scrollbar-track { background: transparent; }
    .q-card-answer::-webkit-scrollbar-thumb { background: #475569; border-radius: 2px; }
  </style>
</head>
<body>
  <div class="hud-panel">
    <div class="drag-region">
      <h1>SolveWatch HUD</h1>
      <div class="status-badge">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Connecting…</span>
        <span class="clock" id="clock">--:--:--</span>
      </div>
    </div>

    <div class="content">
      <div id="interviewQueue" class="interview-queue" style="display:none">
        <div class="queue-label">
          <span>Detected Questions</span>
          <span class="queue-mode-badge">AUTO</span>
        </div>
        <div id="questionCards" class="question-cards"></div>
      </div>
      <div class="ai-response-label">AI Response</div>
      <div class="ai-response" id="aiResponse"></div>
    </div>

    <div class="action-bar">
      <span class="action-status" id="actionStatus"></span>
      <div class="action-buttons">
        <button class="action-btn listener-btn" id="btnListener">Listen</button>
        <button class="action-btn debug-btn" id="btnDebug" disabled>Debug</button>
        <button class="action-btn theory-btn" id="btnTheory" disabled>Theory</button>
        <button class="action-btn coding-btn" id="btnCoding" disabled>Coding</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    const urlParams  = new URLSearchParams(window.location.search);
    const socketUrl  = urlParams.get('socketUrl') || 'http://localhost:4000';

    const statusDot   = document.getElementById('statusDot');
    const statusText  = document.getElementById('statusText');
    const clockEl     = document.getElementById('clock');
    const aiResponse  = document.getElementById('aiResponse');
    const btnDebug    = document.getElementById('btnDebug');
    const btnTheory   = document.getElementById('btnTheory');
    const btnCoding   = document.getElementById('btnCoding');
    const actionStatus = document.getElementById('actionStatus');

    let currentMessageId = null;
    let countdownInterval = null;

    // ── Opacity ──────────────────────────────────────────────────────────────────
    function applyOpacity(value) {
      // value: 0 = opaque, 100 = transparent — delegate to Electron via IPC
      if (window.hudAPI?.setOpacity) {
        window.hudAPI.setOpacity(value);
      }
      try { localStorage.setItem('hud_opacity', value); } catch {}
    }

    // Restore persisted opacity on load
    try {
      const saved = localStorage.getItem('hud_opacity');
      if (saved !== null) applyOpacity(parseInt(saved));
    } catch {}

    // ── Helpers ──────────────────────────────────────────────────────────────────
    function setButtons(enabled) {
      btnDebug.disabled = !enabled;
      btnTheory.disabled = !enabled;
      btnCoding.disabled = !enabled;
    }

    function setActionStatus(text) { actionStatus.textContent = text; }

    function startCountdown(seconds) {
      clearInterval(countdownInterval);
      let remaining = seconds;
      setActionStatus(`Screenshot window: ${remaining}s`);
      countdownInterval = setInterval(() => {
        remaining--;
        if (remaining > 0) {
          setActionStatus(`Screenshot window: ${remaining}s`);
        } else {
          clearInterval(countdownInterval);
          setActionStatus('Processing…');
        }
      }, 1000);
    }

    function formatTime(date = new Date()) {
      return date.toLocaleTimeString('en-GB', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function updateClock() { clockEl.textContent = formatTime(); }
    setInterval(updateClock, 1000);
    updateClock();

    function setConnectionStatus(connected, text) {
      statusDot.className = 'status-dot ' + (connected ? 'connected' : 'disconnected');
      statusText.textContent = text;
    }

    // ── Markdown renderer ────────────────────────────────────────────────────────
    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function renderInline(text) {
      let h = escapeHtml(text);
      h = h.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
      h = h.replace(/\*([^*\n]+)\*/g,     '<em>$1</em>');
      h = h.replace(/`([^`\n]+)`/g,       '<code class="inline-code">$1</code>');
      return h;
    }

    function renderTextBlock(text) {
      const lines = text.split('\n');
      let html = '';
      let listItems = [];

      function flushList() {
        if (listItems.length) {
          html += '<ul class="md-list">' + listItems.map(t => '<li>' + t + '</li>').join('') + '</ul>';
          listItems = [];
        }
      }

      for (const line of lines) {
        const trimmed = line.trim();
        if (/^[-*]\s+/.test(trimmed)) {
          listItems.push(renderInline(trimmed.replace(/^[-*]\s+/, '')));
        } else {
          flushList();
          if (/^#{1,3}\s/.test(trimmed)) {
            html += '<div class="md-h">' + renderInline(trimmed.replace(/^#{1,3}\s+/, '')) + '</div>';
          } else if (/^[A-Za-z ]+:$/.test(trimmed)) {
            html += '<div class="md-h">' + escapeHtml(trimmed.replace(/:$/, '')) + '</div>';
          } else if (trimmed !== '') {
            html += '<div class="text-content">' + renderInline(trimmed) + '</div>';
          }
        }
      }
      flushList();
      return html;
    }

    function renderMarkdown(text) {
      if (!text) return '';
      let html = '';
      const parts = text.split(/(```[\s\S]*?```)/g);
      for (const part of parts) {
        const fenced = part.match(/^```(\w*)\n?([\s\S]*?)\n?```$/);
        if (fenced) {
          const lang = fenced[1] || '';
          html += '<div class="code-block">'
            + (lang ? '<span class="code-lang">' + escapeHtml(lang) + '</span>' : '')
            + '<pre><code>' + escapeHtml(fenced[2]) + '</code></pre>'
            + '</div>';
        } else {
          html += renderTextBlock(part);
        }
      }
      return html;
    }

    function parseQA(text) {
      const m = text.match(/Question:\s*([\s\S]+?)\n+Answer:\s*([\s\S]+)$/i);
      if (m) return { question: m[1].trim(), answer: m[2].trim() };
      return null;
    }

    function setAIResponse(text) {
      if (!text) { aiResponse.innerHTML = ''; return; }
      const qa = parseQA(text);
      if (qa) {
        aiResponse.innerHTML =
          '<div class="q-section"><span class="q-label">Q</span><span class="q-text">' + escapeHtml(qa.question) + '</span></div>'
          + renderMarkdown(qa.answer);
      } else {
        aiResponse.innerHTML = renderMarkdown(text);
      }
      aiResponse.scrollTop = 0;
    }

    // ── Socket ───────────────────────────────────────────────────────────────────
    const socket = io(socketUrl + '/data-updates', { transports: ['websocket'] });

    socket.on('connect',       () => setConnectionStatus(true,  'Connected'));
    socket.on('disconnect',    () => setConnectionStatus(false, 'Disconnected'));
    socket.on('connect_error', () => setConnectionStatus(false, 'Error'));

    // ── Opacity updates from settings page ───────────────────────────────────────
    socket.on('hud_opacity_updated', (data) => {
      applyOpacity(data.value);
      socket.emit('hud_opacity_applied'); // ACK so settings page knows HUD is live
    });

    // ── Screenshot/transcription flow ────────────────────────────────────────────
    socket.on('ai_processing_started', () => {
      setButtons(false);
      if (!actionStatus.textContent) setActionStatus('Processing…');
    });

    socket.on('ai_processing_complete', (data) => {
      clearInterval(countdownInterval);
      if (data.response) setAIResponse(data.response);
      if (data.messageId) {
        currentMessageId = data.messageId;
        setButtons(true);
        setActionStatus('');
      }
    });

    socket.on('aiprocessing_error', (data) => {
      clearInterval(countdownInterval);
      setAIResponse('Error: ' + (data.error || data.message || 'Unknown error'));
      setButtons(!!currentMessageId);
      setActionStatus('');
    });

    socket.on('use_prompt_set', (data) => {
      if (data.screenshotRequired) startCountdown(3);
      else { clearInterval(countdownInterval); setActionStatus('Processing…'); }
    });

    socket.on('use_prompt_error', (data) => {
      clearInterval(countdownInterval);
      setActionStatus('Error: ' + (data.error || 'Unknown'));
      setButtons(!!currentMessageId);
    });

    btnDebug.addEventListener('click', () => {
      if (!currentMessageId) return;
      setButtons(false);
      socket.emit('use_prompt', { promptType: 'debug', messageId: currentMessageId, screenshotRequired: true });
    });
    btnTheory.addEventListener('click', () => {
      if (!currentMessageId) return;
      setButtons(false);
      socket.emit('use_prompt', { promptType: 'theory', messageId: currentMessageId, screenshotRequired: false });
    });
    btnCoding.addEventListener('click', () => {
      if (!currentMessageId) return;
      setButtons(false);
      socket.emit('use_prompt', { promptType: 'coding', messageId: currentMessageId, screenshotRequired: false });
    });

    // ── Listener toggle ──────────────────────────────────────────────────────────
    const btnListener = document.getElementById('btnListener');
    let listenerActive = false;

    function syncListenerButton(active) {
      listenerActive = active;
      btnListener.classList.toggle('listener-active', listenerActive);
      btnListener.textContent = listenerActive ? '● Listening' : 'Listen';
    }

    // Sync button state when server tells us the current always-on status
    socket.on('always_on_state', (data) => {
      syncListenerButton(!!data.enabled);
    });

    btnListener.addEventListener('click', () => {
      listenerActive = !listenerActive;
      syncListenerButton(listenerActive);
      socket.emit('toggle_always_on_mode', { enabled: listenerActive });
    });

    // ── Interview question queue (auto-answered) ──────────────────────────────────
    const questionCardsEl = document.getElementById('questionCards');
    const interviewQueue  = document.getElementById('interviewQueue');
    const questionCardMap = {};
    const MAX_QUEUE = 3;

    function addQuestionCard(questionId, questionText) {
      while (questionCardsEl.children.length >= MAX_QUEUE) {
        const oldest = questionCardsEl.lastElementChild;
        if (oldest) {
          delete questionCardMap[oldest.dataset.questionId];
          questionCardsEl.removeChild(oldest);
        }
      }
      const card = buildCard(questionId, questionText);
      questionCardMap[questionId] = card;
      questionCardsEl.prepend(card);
      interviewQueue.style.display = '';
    }

    function buildCard(questionId, questionText) {
      const card = document.createElement('div');
      card.className = 'q-card';
      card.dataset.questionId = questionId;
      card.dataset.state = 'idle';

      const textEl = document.createElement('div');
      textEl.className = 'q-card-text';
      textEl.textContent = questionText;

      const answerHeader = document.createElement('div');
      answerHeader.className = 'q-card-answer-header';
      answerHeader.style.display = 'none';
      answerHeader.innerHTML = '<span class="q-card-answer-label">Answer</span><span class="q-card-answer-line"></span>';

      const answerEl = document.createElement('div');
      answerEl.className = 'q-card-answer';
      answerEl.style.display = 'none';
      answerEl.dataset.raw = '';

      card.appendChild(textEl);
      card.appendChild(answerHeader);
      card.appendChild(answerEl);
      return card;
    }

    function mergeQuestionCard(questionId, newText) {
      const card = questionCardMap[questionId];
      if (card) card.querySelector('.q-card-text').textContent = newText;
    }

    socket.on('interviewer_question', (data) => {
      addQuestionCard(data.questionId, data.questionText);
    });

    socket.on('merge_question', (data) => {
      mergeQuestionCard(data.questionId, data.questionText);
    });

    socket.on('question_answer_started', (data) => {
      const card = questionCardMap[data.questionId];
      if (!card) return;
      card.dataset.state = 'answering';
      card.querySelector('.q-card-answer-header').style.display = '';
      const answerEl = card.querySelector('.q-card-answer');
      answerEl.style.display = '';
      answerEl.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
      answerEl.dataset.raw = '';
    });

    socket.on('question_answer_token', (data) => {
      const card = questionCardMap[data.questionId];
      if (!card) return;
      const answerEl = card.querySelector('.q-card-answer');
      answerEl.dataset.raw = (answerEl.dataset.raw || '') + data.token;
      answerEl.innerHTML = renderMarkdown(answerEl.dataset.raw);
      answerEl.scrollTop = answerEl.scrollHeight;
    });

    socket.on('question_answer_complete', (data) => {
      const card = questionCardMap[data.questionId];
      if (card) card.dataset.state = 'done';
    });

    // ── Drag ──────────────────────────────────────────────────────────────────────
    function initDrag() {
      document.querySelectorAll('.drag-region, .ai-response-label').forEach((el) => {
        el.addEventListener('mousedown', (e) => {
          if (e.button === 0 && window.hudAPI) {
            window.hudAPI.startDrag(e.screenX, e.screenY);
            const onMove = (ev) => window.hudAPI.dragMove(ev.screenX, ev.screenY);
            const onUp   = () => {
              window.hudAPI.endDrag();
              document.removeEventListener('mousemove', onMove);
              document.removeEventListener('mouseup', onUp);
            };
            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onUp);
          }
        });
      });
    }
    initDrag();
  </script>
</body>
</html>
